<!-- Basic HTML for a Stutter Detector Website with Styles -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stutter Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #f0f4f8;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 420px;
            margin: 3rem auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(44,108,223,0.10);
            padding: 2.5rem 2rem 2rem 2rem;
        }
        h1 {
            color: #2d6cdf;
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 2.2rem;
            letter-spacing: 1px;
        }
        .description {
            color: #444;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.08rem;
        }
        .action-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
        }
        button {
            background: #2d6cdf;
            color: #fff;
            border: none;
            padding: 0.8rem 2.2rem;
            border-radius: 6px;
            font-size: 1.08rem;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: 500;
        }
        button:hover {
            background: #1a4fa0;
        }
        .results-box {
            width: 100%;
            min-height: 60px;
            background: #eaf1fb;
            border: 1.5px solid #b6d0f7;
            border-radius: 6px;
            padding: 1rem;
            color: #1a2a3a;
            font-size: 1.05rem;
            margin-top: 1.2rem;
            resize: none;
        }
        footer {
            text-align: center;
            color: #888;
            margin: 2.5rem 0 1rem 0;
            font-size: 0.97rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stutter Detection</h1>
        <div class="description">
            This tool analyzes your audio and detects stuttering patterns using advanced AI.<br>
            Click the button below to start the detection process.
        </div>
        <div class="action-section">
            <button id="detectBtn">Detect Stutter</button>
            <textarea class="results-box" id="resultsBox" readonly placeholder="Detection results will appear here..."></textarea>
        </div>
    </div>
    <footer>
        &copy; 2025 Stutter Detector Project
    </footer>
    <script>
        document.getElementById('detectBtn').addEventListener('click', async function() {
            const resultsBox = document.getElementById('resultsBox');
            resultsBox.value = 'Detecting...';
            try {
                // Replace '/api/detect-stutter' with your actual backend API endpoint
                const response = await fetch('http://127.0.0.1:8000/stutter_detection', {
                    method: 'POST'
                });
                if (!response.ok) {
                    throw new Error('API request failed');
                }
                const data = await response.json();
                resultsBox.value =  JSON.stringify(data);
            } catch (err) {
                resultsBox.value = 'Error: ' + err.message;
            }
        });
    </script>
</body>
</html>
