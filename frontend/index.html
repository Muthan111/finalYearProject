<!-- Basic HTML for a Stutter Detector Website with Styles -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stutter Detector</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #f4f8fb;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background: #2d6cdf;
            color: #fff;
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        main {
            max-width: 500px;
            margin: 2rem auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(44,108,223,0.08);
            padding: 2rem;
        }
        h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 1px;
        }
        .description {
            color: #555;
            margin-bottom: 2rem;
            text-align: center;
        }
        .upload-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }
        input[type="file"] {
            padding: 0.5rem;
        }
        button {
            background: #2d6cdf;
            color: #fff;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #1a4fa0;
        }
        .results {
            margin-top: 2rem;
            padding: 1rem;
            background: #eaf1fb;
            border-radius: 6px;
            min-height: 60px;
            color: #222;
        }
        footer {
            text-align: center;
            color: #888;
            margin: 2rem 0 1rem 0;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Stutter Detector</h1>
    </header>
    <main>
        <div class="description">
            Upload your audio file to detect stuttering patterns automatically.
        </div>
        <form class="upload-section">
            <input type="file" accept="audio/*">
            <button type="submit">Detect Stutter</button>
        </form>
        <div class="results" id="results">
            <!-- Detection results will appear here -->
        </div>
    </main>
    <footer>
        &copy; 2025 Stutter Detector Project
    </footer>
</body>
</html>
